model:
  id: google/gemma-3n-E4B-it
  device: auto
  dtype: auto
  trust_remote_code: true
  architecture: image_text_to_text
  load:
    low_cpu_mem_usage: true
    attn_implementation: sdpa
    quantization:
      enabled: true
      mode: 4bit
      load_in_4bit: true
      bnb_4bit_quant_type: nf4
      bnb_4bit_compute_dtype: bfloat16
      bnb_4bit_use_double_quant: true

decoding:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  do_sample: false

prompt:
  version: tool_call_v1
  tool_name: transport.where_is_vehicle
  schema_path: specs/001-speech-transit-toolformer/contracts/transport.where_is_vehicle.schema.json
