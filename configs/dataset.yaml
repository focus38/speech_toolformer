seed: 20260622

splits:
  train: 0.7
  validation: 0.15
  test: 0.15

outputs:
  text_dir: data/synthetic_text
  text_dataset: data/synthetic_text/dataset.jsonl
  train: data/synthetic_text/train.jsonl
  validation: data/synthetic_text/validation.jsonl
  test: data/synthetic_text/test.jsonl
  audio_dir: data/synthetic_audio
  audio_metadata: data/synthetic_audio/metadata.jsonl

generation:
  total_examples: 240
  no_tool_ratio: 0.15
  languages:
    - ru
    - en
  cities:
    - moscow
    - saint_petersburg
    - berlin
    - london
    - samara
    - voronezh
    - paris
    - ankara
  transport_types:
    - tram
    - trolleybus
    - bus
  route_number_pools:
    numeric:
      - "5"
      - "7"
      - "10"
      - "90"
      - "272"
      - "120"
      - "60"
      - "45"
      - "20"
    latin_suffix:
      - 55a
      - 80b
      - 90p
      - 1a
      - 2b
      - 3c
      - 10k
    cyrillic_suffix:
      - 90п
      - 55а
      - 10к
      - 20ц
      - 120м
      - 40М

audio:
  sample_rate: 16000
  backend: piper
  tts_engine: piper
  speakers:
    ru: ru_irina
    en: en_lessac
  piper:
    executable: piper
    timeout_seconds: 120
    voices:
      ru:
        voice_id: ru_irina
        model_path: data/voices/ru_irina.onnx
        config_path: data/voices/ru_irina.onnx.json
        model_url: https://huggingface.co/rhasspy/piper-voices/resolve/main/ru/ru_RU/irina/medium/ru_RU-irina-medium.onnx
        config_url: https://huggingface.co/rhasspy/piper-voices/resolve/main/ru/ru_RU/irina/medium/ru_RU-irina-medium.onnx.json
      en:
        voice_id: en_lessac
        model_path: data/voices/en_lessac.onnx
        config_path: data/voices/en_lessac.onnx.json
        model_url: https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/en_US-lessac-medium.onnx
        config_url: https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/en_US-lessac-medium.onnx.json
